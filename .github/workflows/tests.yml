name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Resolve dependencies
        run: swift package resolve

      - name: Run unit tests
        run: |
          swift test \
            --filter 'RemoteCompletionsChatClientUnitTests|RemoteCompletionsChatToolTests|RemoteResponsesClientUnitTests|RequestSanitizerTests|ChatRequestBuilderTests|AppleIntelligenceFunctionTests|AppleIntelligencePromptBuilderTests|AppleIntelligenceToolProxyTests'

  integration-tests:
    name: Integration Tests (moonshotai/kimi-k2.5)
    runs-on: macos-15
    timeout-minutes: 15
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Resolve dependencies
        run: swift package resolve

      # Completions API integration tests
      - name: Run completions integration tests
        run: |
          swift test \
            --filter 'RemoteCompletionsChatClientBasicTests'

      # Responses API integration tests
      - name: Run responses integration tests
        run: |
          swift test \
            --filter 'RemoteResponsesChatClientLiveTests|ResponsesE2ETests|ResponseIntegrationTests'
